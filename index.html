<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Quicklist</title>

    <link rel="stylesheet" href="styles/index.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main class="container">
      <header>
        <img class="desktop-only" src="assets/logo.svg" alt="logo" />
      </header>

      <div class="back">
        <img src="assets/icons/arrow-u-down-left.svg" alt="" />
        <span><a href="">Voltar</a></span>
      </div>

      <h1>Compras da semana</h1>

      <div class="input-wrapper">
        <!-- VISUALIZAR NOVAMENTE -->
        <input
          type="text"
          id="task-input"
          name="task"
          placeholder="Adicione um novo item"
        />
        <a href="#" class="btn">Adicionar item</a>
      </div>

      <!-- LISTA -->
      <ul role="list">
        <li class="hidden">
          <input
            type="checkbox"
            value="textToChange"
            id="item-0"
            name="items"
          />
          <label for="item-0"></label>
          <a class="trash" href=""></a>
        </li>

        <li class="hidden">
          <input
            type="checkbox"
            value="textToChange"
            id="item-1"
            name="items"
          />
          <label for="item-1"></label>
          <a class="trash" href=""></a>
        </li>
      </ul>

      <div id="alert" class="hidden">
        <img src="assets/icons/warning-circle.svg" alt="warning-circle icon" />
        <span>O item foi removido da lista</span>
        <img src="assets/icons/delete.svg" alt="delete icon" />
      </div>
    </main>

    <script src="scripts.js"></script>
  </body>
</html>
